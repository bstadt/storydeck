    body +
    `<p style="color:var(--ink-3);font-size:11px">⏎ draw this tree from the deck to page its ${chs.length} node${chs.length === 1 ? '' : 's'}</p>`;
  seg.scrollTop = 0;
}

// Renders the FULL transcript into the reader; `beat` (or null) is the focus.
// Subject mentions + aliases are highlighted throughout; when a beat is focused
// its span is emphasized and the rest dimmed, and the panel scrolls to it.
// The whole transcript is always freely scrollable.
const _txMarkCache = {};
async function renderReader(ci, beat) {
  const t = T[treeTis[ci]];
  const S = DATA.subjects[selected];
  const css = subjCss(selected);
  openPanel();

  // header info + summary + chips
  const chs = cardHits(ci);
  document.getElementById('r-title').textContent = beat ? beat.beat.l : t.title;
  document.getElementById('r-meta').textContent = beat
    ? (beat.beat.s != null
        ? `${t.date} · ${t.title} · lines ${beat.beat.s}–${beat.beat.e} · ${(beat.beat.w || 0).toLocaleString()} words`
        : `${t.date} · ${t.title}`)
    : `${t.date} · ${t.mtype.replace(/_/g, ' ')} · full transcript · ${t.words.toLocaleString()} words`;
  document.getElementById('r-pos').textContent = beat ? `node ${chs.indexOf(beat) + 1}/${chs.length}` : 'root';
  const sumEl = document.getElementById('r-summary');
  if (beat && beat.beat.sm) { sumEl.style.display = 'block'; sumEl.innerHTML = esc(beat.beat.sm); }
  else sumEl.style.display = 'none';
  const segsEl = document.getElementById('r-segs');
  segsEl.innerHTML = '';
  const rootChip = document.createElement('span');
  rootChip.className = 'seg-chip' + (beat ? '' : ' on');
  rootChip.textContent = '⌂ full transcript';
  rootChip.onclick = () => enterNode(-1);
  segsEl.appendChild(rootChip);
  chs.forEach((h2, j) => {
    const chip = document.createElement('span');
    chip.className = 'seg-chip' + (h2 === beat ? ' on' : '');
    chip.textContent = h2.beat.l.slice(0, 30);
    chip.onclick = () => enterNode(j);
    segsEl.appendChild(chip);
  });

  // 3D ring on focused beat node (hidden in root view)
  if (beat) {
    const w = beat.local.clone(); cards[beat.ci].grp.localToWorld(w);
    ringSprite.position.copy(w); ringSprite.visible = true; ringSprite.userData = { hit: beat };
  } else ringSprite.visible = false;

  const seg = document.getElementById('seg');
  // render full transcript once per (tx, subject-set); cache; then just re-emphasize.
  // In pair mode BOTH subjects are highlighted, each in its own color.
  const cacheKey = t.id + '|' + picks.join(',');
  if (seg.dataset.key !== cacheKey) {
    seg.innerHTML = '<p style="color:var(--ink-3)">loading…</p>';
    if (!txCache[t.id]) txCache[t.id] = await (await fetch(`data/${t.id}.json`)).json();
    await LSP;
    const d = txCache[t.id];
    // per-picked-subject: color, speaker labels (persons), mention lines, surface forms
    const subjInfo = picks.map(cid => {
      const S2 = DATA.subjects[cid], col = subjCss(cid);
      const isPerson = S2.type === 'person';
      const matched = new Set();
      if (isPerson) {
        const toks = new Set(S2.display.toLowerCase().split(/[^a-z0-9]+/).filter(t => t.length > 2));
        for (const sp of new Set((d.speakers || []).filter(Boolean)))
          if (sp.toLowerCase().split(/[^a-z0-9]+/).some(t => toks.has(t))) matched.add(sp);
      }
      const surface = new Set();
      for (const w2 of S2.display.toLowerCase().split(/[()]/)) { const q = w2.trim(); if (q.length > 2) surface.add(q); }
      const markLines = {};
      for (const s2 of d.subjects) {
        const c = (window.__canon && window.__canon[s2.id]) || s2.id;
        if (c !== cid) continue;
        if (s2.display && s2.display.length > 2) surface.add(s2.display.toLowerCase());
        for (const a of s2.aliases || []) if (a && a.length > 2) surface.add(a.toLowerCase());
        for (const m of s2.mentions) (markLines[m.line] = markLines[m.line] || []).push(m.quote);
      }
      return { cid, col, isPerson, matched, markLines,
               surfaceArr: [...surface].sort((a, b) => b.length - a.length) };
    });
    const html = [];
    for (let n = 1; n <= d.lines.length; n++) {
      const line = d.lines[n - 1];
      if (!line || !line.trim() || isMetaLine(line)) continue;
      const low = line.toLowerCase();
      const spans = [];   // [start, end, color]
      for (const si of subjInfo) {
        for (const q of si.markLines[n] || []) {
          const idx = low.indexOf(q.toLowerCase().replace(/\s+/g, ' ').trim().slice(0, 80));
          if (idx >= 0) spans.push([idx, idx + Math.min(q.length, line.length - idx), si.col]);
        }
        for (const term of si.surfaceArr) {
          let from = 0, idx;
          while ((idx = low.indexOf(term, from)) >= 0) {
            const b0 = idx === 0 || !/[a-z0-9]/.test(low[idx - 1]);
            const a0 = idx + term.length >= low.length || !/[a-z0-9]/.test(low[idx + term.length]);
            if (b0 && a0) spans.push([idx, idx + term.length, si.col]);
            from = idx + term.length;
          }
        }
      }
      spans.sort((a, b) => a[0] - b[0] || b[1] - a[1]);
      const merged = [];   // greedy non-overlapping, first color wins
      for (const sp of spans) {
        if (merged.length && sp[0] < merged[merged.length - 1][1]) continue;
        merged.push([...sp]);
      }
      let out = '', pos = 0;
      for (const [a2, b2, col] of merged) {
        out += esc(line.slice(pos, a2)) +
          `<mark style="border-color:${col};background:color-mix(in srgb, ${col} 22%, transparent)">` +
          esc(line.slice(a2, b2)) + '</mark>';
        pos = b2;
      }
      out += esc(line.slice(pos));
      const isSpk = SPK_RE.test(line.trim()) && line.trim().split(/\s+/).length <= 6;
      const spk = (d.speakers || [])[n - 1];
      const voiceSi = subjInfo.find(si => si.isPerson && si.matched.has(spk));
      const spokeStyle = voiceSi ? ` style="--subj:${voiceSi.col}"` : '';
      html.push(`<p class="txl${isSpk ? ' spk' : ''}${voiceSi ? ' spoke' : ''}"${spokeStyle} data-l="${n}">${out}</p>`);
    }
    seg.innerHTML = html.join('');
    seg.dataset.key = cacheKey;
  }

  // emphasis + scroll
  seg.classList.toggle('focus', !!beat);
  seg.querySelectorAll('.txl.inb').forEach(el => el.classList.remove('inb', 'first'));
  if (beat) {
    const inb = [...seg.querySelectorAll('.txl')].filter(el => {
      const n = +el.dataset.l; return n >= beat.beat.s && n <= beat.beat.e;
    });
    inb.forEach(el => el.classList.add('inb'));
    if (inb[0]) inb[0].classList.add('first');
    // scroll: first highlighted mention within the beat, else beat start
    const firstMark = inb.find(el => el.querySelector('mark')) || inb[0];
    if (firstMark) seg.scrollTop = Math.max(0, firstMark.offsetTop - seg.clientHeight * 0.3);
  } else {
    seg.scrollTop = 0;
  }
}

// In the entered (full-transcript) view: scroll the transcript to the turn(s)
// grounding the hovered node's triples, and highlight them.
let _lastGround = '';
function scrollToGrounding(info) {
  if (_lastGround === info.id) return;
  _lastGround = info.id;
  const seg = document.getElementById('seg');
  if (!seg || !seg.dataset.key) return;
  seg.querySelectorAll('.txl.turnhot').forEach(el => el.classList.remove('turnhot'));
  const lines = [...new Set(info.trips.map(t => t[4]).filter(l => l > 0))].sort((a, b) => a - b);
  if (!lines.length) return;
  const all = [...seg.querySelectorAll('.txl')];
  let first = null;
  for (const ln of lines) {
    // grounding line may be a skipped/meta line — take the nearest rendered line at/after it
    const el = seg.querySelector(`.txl[data-l="${ln}"]`) || all.find(e => +e.dataset.l >= ln);
    if (el) { el.classList.add('turnhot'); if (!first) first = el; }
  }
  if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ---------------- raycast ----------------
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoverIdx = null, hoverRoot = null;
let hoverNode = null;
renderer.domElement.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  ray.setFromCamera(mouse, camera);
  const place = () => {
    const flip = e.clientX > innerWidth - 380;
    tip.style.left = flip ? '' : (e.clientX + 14) + 'px';
    tip.style.right = flip ? (innerWidth - e.clientX + 14) + 'px' : '';
    tip.style.top = (e.clientY + 14) + 'px';
  };
  // zoomed into a card: hover ANY node → reveal its mined triplets
  hoverNode = null;
  if (mode === 'tree' || mode === 'node' || mode === 'rhizome') {
    const cardNodes = nodeMeshes.filter(m => {
      const ci = m.userData.nodeInfo.ci;
      return mode === 'rhizome' ? (cards[ci] && cards[ci].vis > 0.5) : ci === focusIdx;
    });
    const nh = ray.intersectObjects(cardNodes)[0];
    if (nh) {
      hoverNode = nh.object.userData.nodeInfo;
      hoverIdx = nh.object.userData.hitIndex ?? null;
      hoverRoot = null;
      renderer.domElement.style.cursor = 'pointer';
      const rows = hoverNode.trips.slice(0, 10).map(t =>
        `<span style="color:#cfd4de">${esc(t[0])}</span> <span style="color:var(--subj,#7e8698)">${esc(t[1])}</span> <span style="color:#cfd4de">${esc(t[2])}</span>`).join('<br>');
      tip.style.display = 'block';
      tip.innerHTML = `<b>${esc(hoverNode.id)}</b> <span style="color:#888">· ${hoverNode.trips.length} triple${hoverNode.trips.length === 1 ? '' : 's'}</span><br>${rows}${hoverNode.trips.length > 10 ? '<br>…' : ''}`;
      place();
      if (mode === 'node') scrollToGrounding(hoverNode);   // jump transcript to the grounding turn
      return;
    }
  }
  const glow = mode === 'rhizome'
    ? glowMeshes.filter(m => { const c = cards[m.userData.nodeInfo.ci]; return c && c.vis > 0.5; })
    : glowMeshes;
  const hit = ray.intersectObjects(glow)[0];
  hoverIdx = hit ? hit.object.userData.hitIndex : null;
  const rhit = hoverIdx == null ? ray.intersectObjects(rootMeshes)[0] : null;
  hoverRoot = rhit ? rhit.object.userData.rootCi : null;
  renderer.domElement.style.cursor = (hit || rhit) ? 'pointer' : '';
  if (hit) {
    const h = hits[hoverIdx];
    tip.style.display = 'block';
    tip.innerHTML = `<b>${esc(h.node || h.beat.label || '')}</b><br>${T[h.ti].date} · ${esc(T[h.ti].title.slice(0, 60))}`;
    place();
  } else if (rhit) {
    const t = T[treeTis[hoverRoot]];
    tip.style.display = 'block';
    tip.innerHTML = `<b>⌂ full transcript</b><br>${t.date} · ${esc(t.title.slice(0, 60))}`;
    place();
  } else tip.style.display = 'none';
});
renderer.domElement.addEventListener('click', () => {
  if (mode === 'rhizome') {         // click a node in the arc → expand the deck to that card
    if (hoverNode) enterTree(hoverNode.ci);
    return;
  }
  if (hoverIdx != null) {
    const h = hits[hoverIdx];
    if (h.ci !== focusIdx) enterTree(h.ci);
    enterNode(cardHits(h.ci).indexOf(h));
  } else if (hoverRoot != null) {
    if (hoverRoot !== focusIdx) enterTree(hoverRoot);
    enterNode(-1);   // whole transcript
  }
});

// ---------------- topbar subject picker ----------------
function updateCollapse() {
  const q = document.getElementById('q');
  q.value = selected && DATA.subjects[selected] ? DATA.subjects[selected].display : '';
}
function setDropdown(open) {
  document.getElementById('dd').classList.toggle('open', open);
  document.getElementById('picker').classList.toggle('open', open);
  document.getElementById('reader').classList.toggle('dd-hidden', open);  // hide narrative card while picking
  if (open) document.getElementById('q').focus();
}
document.getElementById('dd').onclick = e => e.stopPropagation();
addEventListener('click', () => setDropdown(false));

// ---------------- sidebar list ----------------
function activeRow(id) {
  const s = DATA.subjects[id];
  const d = document.createElement('div');
  d.className = 'subj' + (id === selected ? ' on' : '');
  d.innerHTML =
    `<span class="lbl"><span class="dot" style="background:${subjCss(id)}"></span>` +
    `<span class="nm">${esc(s.display)}</span></span>` +
    `<span class="right"><span class="n">${s.n_tx} trees</span>` +
    `<span class="rm" title="remove from active">×</span></span>`;
  d.querySelector('.rm').onclick = ev => { ev.stopPropagation(); deactivateSubject(id); };
  d.onclick = ev => { ev.stopPropagation(); select(id); };
  return d;
}
async function deactivateSubject(id) {
  if (picks.includes(id)) setPicks(picks.filter(x => x !== id));   // drop from view if selected
  const status = document.getElementById('dd-status');
  status.innerHTML = `<span class="spin"></span>removing “${esc(DATA.subjects[id].display)}”…`;
  try {
    await fetch('api/deactivate', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subject: id }) });
  } catch (e) { /* ignore; reload reflects true state */ }
  await loadRegistry();     // it's now potential — active list re-renders without it
  status.textContent = '';
}
function renderActive() {
  const el = document.getElementById('active-list');
  el.innerHTML = '';
  const qv = document.getElementById('q').value.toLowerCase().trim();
  const filterQ = selected && DATA.subjects[selected] &&
    qv === DATA.subjects[selected].display.toLowerCase() ? '' : qv;  // selection echo ≠ a filter
  let act = Object.keys(REG.subjects).filter(isActive)
    .filter(id => DATA.subjects[id]);
  if (filterQ) act = act
    .map(id => [id, subjScore(filterQ, id, DATA.subjects[id].display)])
    .filter(([, sc]) => sc > 0)
    .sort((a, b) => (b[1] - a[1]) ||
      (DATA.subjects[b[0]].n_tx - DATA.subjects[a[0]].n_tx))
    .map(([id]) => id);
  else act.sort((a, b) => DATA.subjects[b].n_tx - DATA.subjects[a].n_tx);
  if (!act.length) { el.innerHTML = '<div class="hint" style="margin:2px">no matches</div>'; return; }
  for (const id of act) el.appendChild(activeRow(id));
}
// typo-tolerant match: exact substring ranks highest; otherwise per-word edit
// similarity, so e.g. "etheria" still surfaces "Etherea".
function editRatio(a, b) {
  const m = a.length, n = b.length;
  if (!m || !n) return 0;
  const dp = Array.from({ length: m + 1 }, (_, i) => i);
  for (let j = 1; j <= n; j++) {
    let prev = dp[0]; dp[0] = j;
    for (let i = 1; i <= m; i++) {
      const tmp = dp[i];
      dp[i] = Math.min(dp[i] + 1, dp[i - 1] + 1, prev + (a[i - 1] === b[j - 1] ? 0 : 1));
      prev = tmp;
    }
  }
  return 1 - dp[m] / Math.max(m, n);
}
function subjScore(q, id, display) {
  let best = 0;
  for (const h of [id.replace(/-/g, ' '), display.toLowerCase()]) {
    const idx = h.indexOf(q);
    if (idx >= 0) { best = Math.max(best, 200 - idx); continue; }
    if (q.length >= 3) {
      for (const w of h.split(/[^a-z0-9]+/)) {
        if (w.length < 3) continue;
        const r = editRatio(q, w);
        if (r >= 0.7) best = Math.max(best, 60 + r * 60);            // typo-close word
      }
    }
  }
  return best;
}
const qEl=document.getElementById('q');
qEl.oninput = () => { setDropdown(true); renderActive(); };
qEl.onfocus = () => { qEl.select(); setDropdown(true); renderActive(); };
qEl.onclick = e => e.stopPropagation();
loadRegistry();
updateCollapse();

// ---------------- loop ----------------
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  const t = clock.getElapsedTime();
  const pulse = 0.34 + 0.2 * Math.sin(t * 2.4);
  threadAlpha += ((mode === 'tree' ? 1 : 0) - threadAlpha) * 0.16;   // thread only in the expanded spread
  for (const m of pulseMats) m.opacity = pulse * threadAlpha;
  if (viewGoal) {   // camera glide (smooth pan) toward a pending view goal
    _pv.copy(viewGoal).sub(controls.target);
    if (_pv.lengthSq() < 0.002) { const g = viewGoal; viewGoal = null; setViewTarget(g); }
    else { _pv.multiplyScalar(0.07); controls.target.add(_pv); camera.position.add(_pv); }
  }
  deck.position.z += (deckTargetZ - deck.position.z) * 0.14;
  _faceQuat.copy(camera.quaternion);   // card parallel to screen, upright, no mirror
  if (mode === 'rhizome' && closeP < OPEN_END) {
    // deck → arc reverse choreography: (1) other cards' nodes fade out,
    // (2) the shells collapse into the stack, (3) the focused card turns planar.
    closeP = Math.min(OPEN_END, closeP + 0.028);
    const fadeOutP = Math.min(1, closeP / 0.35);
    const colP = Math.min(1, Math.max(0, (closeP - 0.35) / 0.65));
    const rotP = Math.min(1, Math.max(0, (closeP - 1) / 0.35));
    // camera stays put; the stack forms ON the focused card's slot so it never moves
    const F = cards[focusIdx];
    const fy = CH / 2 + F.riseCur, fz = F.baseZ;
    for (const c of cards) {
      const focused = c.ci === focusIdx;
      if (!focused) c.riseCur *= 0.9;
      if (focused) {
        // deterministic turn: exact endpoints, no easing tail at the arc handoff
        const s = rotP * rotP * (3 - 2 * rotP);   // smoothstep
        _q.slerpQuaternions(c.q0 || _IDENT, _faceQuat, s);
        c.grp.quaternion.copy(_q);
        const s0 = c.s0 ?? 1;
        c.grp.scale.setScalar(s0 + (1.16 - s0) * s);
      } else {
        c.grp.quaternion.slerp(_IDENT, 0.25);
        c.grp.scale.x += (1 - c.grp.scale.x) * 0.2; c.grp.scale.y = c.grp.scale.z = c.grp.scale.x;
      }
      _rc.set(0, CH / 2, 0).applyQuaternion(c.grp.quaternion).multiplyScalar(c.grp.scale.x);
      // card CENTER: own slot → the focused card's slot; during the turn the focused
      // card eases up to the arc's resting height so the handoff has no jump
      const cy0 = CH / 2 + c.riseCur, cz0 = c.baseZ;
      let cy = cy0 + (fy - cy0) * colP, cz = cz0 + (fz - cz0) * colP;
      if (focused) {
        const s = rotP * rotP * (3 - 2 * rotP);
        const y0 = c.y0 ?? fy;
        cy = y0 + ((CH / 2 + 6) - y0) * s;
      }
      c.grp.position.set(-_rc.x, cy - _rc.y, cz - _rc.z);
      const shellA = focused ? 1 : Math.max(0, 1 - Math.max(0, (colP - 0.7) / 0.3));   // shells vanish as they land
      const ft = c.fadeT ?? 1;
      const shellB = ft + (1 - ft) * fadeOutP;   // phase 1 lights ALL shells (both sides of focus)
      const contentA = focused ? 1 : ft * (1 - fadeOutP);
      for (const { mat, base } of c.fades) {
        const isShell = (mat === c.frameMat || mat === c.backMat);
        mat.opacity = base * (isShell ? (focused ? 1 : shellB * shellA) : contentA);
      }
      if (focused) { c.frameMat.opacity = 1; c.backMat.opacity = 0.42; }   // match the arc exactly
      c.frameMat.color.setHex(subjHex(selected));
      c.vis = focused ? 1 : 0;
      c.grp.visible = focused || shellA > 0.02 || contentA > 0.02;
    }
    if (closeP >= OPEN_END) {   // choreography done — NOW glide the camera to the arc home
      deckTargetZ = 0;
      targetViewSize = rhizomeView;
      setViewTargetSmooth(new THREE.Vector3(0, CH / 2 + 6, 0).addScaledVector(SCREEN_RIGHT, 12));
    }
  } else if (mode === 'rhizome') {
    // LONG ARC: all cards stacked planar at the open-space center; a time playhead
    // (arcT) sweeps chronologically through them, fading each in and out.
    const n = cards.length;
    if (arcSnap != null) arcT += (arcSnap - arcT) * 0.3;
    else if (arcPlaying && n > 1) {
      // hold on each card (long dwell), then snap abruptly to the next
      if (arcHold > 0) arcHold--;
      else { const nx = Math.round(arcTarget) + 1; if (nx >= n) { arcTarget = 0; arcT = 0; } else arcTarget = nx; arcHold = ARC_DWELL; }
      arcT += (arcTarget - arcT) * 0.16;
    }
    const curCard = ((Math.round(arcT) % n) + n) % n;   // the single card holding the frame + background
    _tgt.set(0, CH / 2 + 6, 0).sub(deck.position);
    for (const c of cards) {
      c.grp.quaternion.slerp(_faceQuat, 0.16);
      c.grp.scale.x += (1.16 - c.grp.scale.x) * 0.16; c.grp.scale.y = c.grp.scale.z = c.grp.scale.x;
      _rc.set(0, CH / 2, 0).applyQuaternion(c.grp.quaternion).multiplyScalar(c.grp.scale.x);
      c.grp.position.set(_tgt.x - _rc.x, _tgt.y - _rc.y, _tgt.z - _rc.z + (c.ci - arcT) * 0.02);
      const dd = Math.abs(c.ci - arcT);
      let fade = Math.max(0, 1 - dd * 3.0); fade *= fade;   // graph content swaps; frame/back are stable
      const isCur = c.ci === curCard;
      for (const { mat, base } of c.fades) mat.opacity = base * fade;
      c.frameMat.opacity = isCur ? 1 : 0;                   // exactly one lit frame — no flash
      c.backMat.opacity = isCur ? 0.42 : 0;                 // stable background — no flash
      c.frameMat.color.setHex(subjHex(selected));
      c.vis = fade; c.grp.visible = fade > 0.02 || isCur;
    }
  } else {
    // expanded spread. node = focused card turned to face the screen at center.
    // tree open = 2 phases: (1) the focused card rotates flat, (2) the other cards
    // extrude out of it into the deck lineup while the focused card rises (un-turned).
    const entered = (mode === 'node');
    if (mode === 'tree') openP = Math.min(OPEN_END, openP + 0.028); else openP = OPEN_END;
    const rotP = Math.min(1, openP / 0.35);                              // phase 1: rotate
    const extP = Math.min(1, Math.max(0, (openP - 0.35) / 0.65));        // phase 2: extrude
    const contentP = Math.min(1, Math.max(0, (openP - 1) / 0.35));       // phase 3: other cards' nodes fade in
    for (const c of cards) {
      c.grp.visible = true; c.vis = 1;
      const focused = c.ci === focusIdx;
      c.riseCur += (c.targetY - c.riseCur) * 0.16;
      // rotation: node-focused faces screen; tree-focused rotates flat over phase 1; others flat
      let qt = _IDENT;
      if (entered && focused) qt = _faceQuat;
      else if (mode === 'tree' && focused) { _q.slerpQuaternions(_faceQuat, _IDENT, rotP); qt = _q; }
      c.grp.quaternion.slerp(qt, 0.2);
      const sT = (entered && focused) ? 1.16 : 1;
      c.grp.scale.x += (sT - c.grp.scale.x) * 0.16; c.grp.scale.y = c.grp.scale.z = c.grp.scale.x;
      _rc.set(0, CH / 2, 0).applyQuaternion(c.grp.quaternion).multiplyScalar(c.grp.scale.x);
      if (entered && focused) {
        _tgt.set(0, CH / 2 + 6, 0).sub(deck.position);
        _pv.set(_tgt.x - _rc.x, _tgt.y - _rc.y, _tgt.z - _rc.z);
      } else {
        const spX = -_rc.x, spY = (CH / 2 + c.riseCur) - _rc.y, spZ = c.baseZ - _rc.z;   // deck-spread slot
        // extrude out of the stacked center — for the focused card always, and for the
        // others only when opening from the arc (from a card, they're already spread)
        if (mode === 'tree' && extP < 1 && (focused || openFrom === 'rhizome')) {
          _tgt.set(0, CH / 2 + 6, 0).sub(deck.position);
          const cx = _tgt.x - _rc.x, cy = _tgt.y - _rc.y, cz = _tgt.z - _rc.z;
          const e = focused ? Math.min(1, extP * 1.4) : extP;   // focused rises slightly ahead
          _pv.set(cx + (spX - cx) * e, cy + (spY - cy) * e, cz + (spZ - cz) * e);
        } else _pv.set(spX, spY, spZ);
      }
      c.grp.position.copy(_pv);
      // phase 3: extruding cards travel as bare frames/backs; their graph content
      // (nodes/edges/halos) fades in only AFTER the extrude lands
      if (mode === 'tree' && openP < OPEN_END && openFrom === 'rhizome' && !focused) {
        for (const { mat, base } of c.fades) {
          const isShell = (mat === c.frameMat || mat === c.backMat);
          mat.opacity = base * (c.fadeT ?? 1) * (isShell ? 1 : contentP);
        }
      }
      // borders travel LIT in the subject color and relax to the resting
      // palette as content lands — mirrors the deck → arc reverse choreography
      if (mode === 'tree' && openP < OPEN_END && openFrom === 'rhizome') {
        _colA.setHex(subjHex(selected));
        _colB.setHex(focused ? 0x9aa1b3 : 0x2b2f3a);
        c.frameMat.color.copy(_colA.lerp(_colB, contentP));
        if (!focused) c.frameMat.opacity = 0.9;
      }
    }
  }
  if (Math.abs(targetViewSize - viewSize) > 0.05) {
    viewSize += (targetViewSize - viewSize) * 0.12;
    setFrustum();
  }
  if (ringSprite.visible && ringSprite.userData.hit) {
    const h = ringSprite.userData.hit;
    const w = h.local.clone();
    cards[h.ci].grp.localToWorld(w);
    ringSprite.position.copy(w);
    const rp = 4.0 + 0.5 * Math.sin(t * 3);
    ringSprite.scale.set(rp, rp, 1);
  }
  for (const th of threads) {
    const ord = th.ordered;
    if (ord.length < 2) continue;
    const arr = th.geo.attributes.position.array;
    const px = h => h.world.x, py = h => h.world.y + cards[h.ci].grp.position.y, pz = h => h.world.z;
    let w = 0;
    arr[w++] = px(ord[0]); arr[w++] = py(ord[0]); arr[w++] = pz(ord[0]);
    for (let i = 0; i + 1 < ord.length; i++) {
      const A = ord[i], B = ord[i + 1], sp = th.spans[i];
      const ax = px(A), ay = py(A), az = pz(A), bx = px(B), by = py(B), bz = pz(B);
      if (sp.n === 1) { arr[w++] = bx; arr[w++] = by; arr[w++] = bz; continue; }
      // arc clear of the skipped cards: subject A bows UP over the deck top, subject
      // B bows DOWN under the deck floor. Apex reach grows with the card gap.
      const lift = Math.min(16 + sp.gap * 3, 52);
      const cx = (ax + bx) / 2;
      const cy = (ay + by) / 2 + (th.over ? lift : -lift);
      const cz = (az + bz) / 2;
      for (let s = 1; s <= sp.n; s++) {
        const t = s / sp.n, it = 1 - t, c0 = it * it, c1 = 2 * it * t, c2 = t * t;
        arr[w++] = c0 * ax + c1 * cx + c2 * bx;
        arr[w++] = c0 * ay + c1 * cy + c2 * by;
        arr[w++] = c0 * az + c1 * cz + c2 * bz;
      }
    }
    th.geo.attributes.position.needsUpdate = true;
  }
  renderer.render(scene, camera);
}
animate();
</script>
