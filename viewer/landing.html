<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Storydeck</title>
<style>
  :root{ --bg:#08090c; --panel:rgba(16,18,24,.92); --ink:#e8e6df; --mut:#9a9890;
         --accent:#4d94e8; --line:#23262e; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font:14px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden}
  #stage{position:fixed;inset:0;z-index:0;opacity:.75}
  #wrap{position:relative;z-index:1;min-height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:40px 20px;text-align:center;
    pointer-events:none}
  #wrap > div{pointer-events:auto}
  h1{font-size:56px;letter-spacing:.02em;margin:0 0 10px;color:#fff;user-select:none;
    text-shadow:0 0 30px rgba(77,148,232,.25)}
  #tag{color:var(--mut);max-width:560px;margin:0 auto 28px;font-size:14.5px}
  #login{background:#1d2634;color:var(--accent);border:1px solid #2b3a52;border-radius:9px;
    padding:10px 26px;font:inherit;font-size:14px;font-weight:600;cursor:pointer;
    transition:filter .2s}
  #login:hover{filter:brightness(1.2)}
  #gate{display:none;margin-top:26px}
  #gate.open{display:block;animation:rise .25s ease}
  body.gated #login{display:none}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  #pw{background:#0d0f14;color:var(--ink);border:1px solid var(--line);border-radius:9px;
    padding:10px 14px;font:inherit;width:260px;outline:none;text-align:center}
  #pw:focus{border-color:#2b3a52}
  #go{background:#1d2634;color:var(--accent);border:1px solid #2b3a52;border-radius:9px;
    padding:10px 18px;font:inherit;font-weight:600;cursor:pointer;margin-left:8px}
  #msg{min-height:20px;margin-top:10px;font-size:12px;color:#ef6a68}
  #hint{margin-top:6px;font-size:11.5px;color:var(--mut)}
  #gh{position:fixed;right:22px;bottom:18px;z-index:1;display:flex;flex-direction:column;
    align-items:center;gap:6px;text-decoration:none;color:var(--mut);font-size:11.5px;
    opacity:.8;transition:opacity .2s}
  #gh:hover{opacity:1;color:var(--ink)}
  #gh svg{width:30px;height:30px;fill:#e8e6df}
</style></head>
<body>
<div id="stage"></div>
<div id="wrap">
  <div>
    <h1>Storydeck</h1>
    <div id="tag">Storydeck: Recorded Transcripts → Interactive Narrative Understanding</div>
    <button id="login">login</button>
    <div id="gate">
      <div>
        <input id="pw" type="password" placeholder="password" autocomplete="current-password">
        <button id="go">enter</button>
      </div>
      <div id="msg"></div>
      <div id="hint">this instance hosts a private corpus — access requires a password</div>
    </div>
  </div>
</div>
<a id="gh" href="https://github.com/bstadt/storydeck">
  <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
  bstadt/storydeck
</a>
<script type="importmap">
{ "imports": { "three": "./lib/three.module.js" } }
</script>
<script type="module">
// The stories tab's deck choreography, verbatim math on synthetic cards:
// arc rest (one card facing camera) -> 2-phase open (focused turns planar,
// others extrude into the lineup, content fades in) -> paging (deck slides,
// focused rises, neighbors dim) -> reverse collapse -> loop.
import * as THREE from 'three';
const stage=document.getElementById('stage');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x08090c,1);
stage.appendChild(renderer.domElement);
let viewSize=34, targetViewSize=34;
const camera=new THREE.OrthographicCamera(-1,1,1,-1,-2000,2000);
function setFrustum(){ const a=innerWidth/innerHeight;
  camera.left=-viewSize*a; camera.right=viewSize*a;
  camera.top=viewSize; camera.bottom=-viewSize;
  camera.updateProjectionMatrix(); }
const deg=THREE.MathUtils.degToRad;
const ISO=new THREE.Vector3(Math.cos(deg(15))*Math.sin(deg(45)),Math.sin(deg(15)),
  Math.cos(deg(15))*Math.cos(deg(45))).normalize();
camera.position.copy(ISO.clone().multiplyScalar(400));
const CW=44, CH=30, DZ=16;
camera.lookAt(0,CH/2+2,0);
setFrustum();
addEventListener('resize',()=>{ setFrustum(); renderer.setSize(innerWidth,innerHeight); });
const _faceQuat=camera.quaternion.clone(), _IDENT=new THREE.Quaternion();
const _q=new THREE.Quaternion(), _rc=new THREE.Vector3(), _tgt=new THREE.Vector3(), _pv=new THREE.Vector3();
const _colA=new THREE.Color(), _colB=new THREE.Color();
const ACCENT=0x4d94e8;

const scene=new THREE.Scene();
const deck=new THREE.Group(); scene.add(deck);
const N=9, cards=[];
for(let ci=0;ci<N;ci++){
  const z=-(ci-(N-1)/2)*DZ;
  const grp=new THREE.Group(); grp.position.z=z;
  const fades=[];
  const reg=(mat,base)=>{ mat.transparent=true; fades.push({mat,base}); return mat; };
  const backMat=reg(new THREE.MeshBasicMaterial({color:0x11141b,side:THREE.DoubleSide,depthWrite:false}),0.42);
  const back=new THREE.Mesh(new THREE.PlaneGeometry(CW,CH),backMat);
  back.position.y=CH/2; grp.add(back);
  const frameMat=reg(new THREE.LineBasicMaterial({color:0x2b2f3a}),0.9);
  grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-CW/2,0,0),new THREE.Vector3(CW/2,0,0),
    new THREE.Vector3(CW/2,CH,0),new THREE.Vector3(-CW/2,CH,0),
    new THREE.Vector3(-CW/2,0,0)]),frameMat));
  // synthetic triplet graph (deterministic per card)
  let h=2166136261^(ci*2654435761);
  const rnd=()=>{ h=(h*16807)%2147483647; return (h&0xffff)/0xffff; };
  const k=6+Math.floor(rnd()*5), pts=[];
  for(let j=0;j<k;j++) pts.push(new THREE.Vector3((rnd()-0.5)*CW*0.72, CH*0.16+rnd()*CH*0.66, 0.2));
  const edgeMat=reg(new THREE.LineBasicMaterial({color:0x7e8698}),1);
  const epts=[];
  for(let j=0;j<k;j++){ const m=Math.floor(rnd()*k); if(m!==j) epts.push(pts[j],pts[m]); }
  grp.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(epts),edgeMat));
  const nodeMat=reg(new THREE.MeshBasicMaterial({color:0x8b90a0}),1);
  const hitMat=reg(new THREE.MeshBasicMaterial({color:ACCENT}),1);
  pts.forEach((p,j)=>{
    const m=new THREE.Mesh(new THREE.SphereGeometry(j===0?1.05:0.55+rnd()*0.5,10,10),
                           j===0?hitMat:nodeMat);
    m.position.copy(p); grp.add(m);
  });
  deck.add(grp);
  cards.push({grp,ci,fades,frameMat,backMat,riseCur:0,targetY:0,baseZ:z,q0:null,s0:1,y0:0,fadeT:1});
}

const OPEN_END=1.35;
let mode='stack', focusIdx=0, openP=OPEN_END, closeP=OPEN_END, deckTargetZ=0, wait=60;
function applyFadesTree(){
  for(const c of cards){
    const d=c.ci-focusIdx;
    let fade;
    if(d===0){ fade=1; c.targetY=4.5; }
    else { c.targetY=0; fade = d<0?0.07:Math.max(0.3,0.8-d*0.07); }
    c.fadeT=fade;
  }
}
function tick(){
  requestAnimationFrame(tick);
  if(Math.abs(targetViewSize-viewSize)>0.05){ viewSize+=(targetViewSize-viewSize)*0.12; setFrustum(); }
  deck.position.z+=(deckTargetZ-deck.position.z)*0.12;

  if(mode==='stack'){
    // arc rest: the focused card faces the camera at the stack slot; others hidden
    const F=cards[focusIdx];
    for(const c of cards){
      const focused=c.ci===focusIdx;
      c.grp.quaternion.slerp(focused?_faceQuat:_IDENT,0.25);
      const sT=focused?1.16:1;
      c.grp.scale.setScalar(c.grp.scale.x+(sT-c.grp.scale.x)*0.2);
      _rc.set(0,CH/2,0).applyQuaternion(c.grp.quaternion).multiplyScalar(c.grp.scale.x);
      const cy=focused?CH/2+6:CH/2, cz=F.baseZ;
      c.grp.position.set(-_rc.x,cy-_rc.y,cz-_rc.z);
      for(const {mat,base} of c.fades) mat.opacity=focused?base:0;
      c.frameMat.color.setHex(ACCENT);
      if(focused){ c.frameMat.opacity=1; c.backMat.opacity=0.42; }
    }
    if(--wait<=0){ mode='open'; openP=0;
      const F2=cards[focusIdx];
      F2.q0=F2.grp.quaternion.clone(); }
  } else if(mode==='open'||mode==='page'){
    if(mode==='open') openP=Math.min(OPEN_END,openP+0.028);
    const rotP=Math.min(1,openP/0.35);
    const extP=Math.min(1,Math.max(0,(openP-0.35)/0.65));
    const contentP=Math.min(1,Math.max(0,(openP-1)/0.35));
    applyFadesTree();
    for(const c of cards){
      const focused=c.ci===focusIdx;
      c.riseCur+=(c.targetY-c.riseCur)*0.16;
      let qt=_IDENT;
      if(focused&&openP<OPEN_END){ _q.slerpQuaternions(_faceQuat,_IDENT,rotP); qt=_q; }
      c.grp.quaternion.slerp(qt,0.2);
      c.grp.scale.setScalar(c.grp.scale.x+(1-c.grp.scale.x)*0.16);
      _rc.set(0,CH/2,0).applyQuaternion(c.grp.quaternion).multiplyScalar(c.grp.scale.x);
      const spX=-_rc.x, spY=(CH/2+c.riseCur)-_rc.y, spZ=c.baseZ-_rc.z;   // deck slot
      if(openP<OPEN_END&&extP<1){
        _tgt.set(0,CH/2+6,0).sub(deck.position);
        const cx=_tgt.x-_rc.x, cy=_tgt.y-_rc.y, cz=_tgt.z-_rc.z;
        const e=focused?Math.min(1,extP*1.4):extP;
        _pv.set(cx+(spX-cx)*e,cy+(spY-cy)*e,cz+(spZ-cz)*e);
      } else _pv.set(spX,spY,spZ);
      c.grp.position.copy(_pv);
      for(const {mat,base} of c.fades){
        const isShell=(mat===c.frameMat||mat===c.backMat);
        const contentA=(openP<OPEN_END&&!focused)?contentP:1;
        mat.opacity=base*c.fadeT*(isShell?1:contentA);
      }
      // borders travel lit, relaxing to the resting palette as content lands
      if(openP<OPEN_END){
        _colA.setHex(ACCENT); _colB.setHex(focused?0x9aa1b3:0x2b2f3a);
        c.frameMat.color.copy(_colA.lerp(_colB,contentP));
      } else c.frameMat.color.setHex(focused?0x9aa1b3:0x2b2f3a);
    }
    if(mode==='open'&&openP>=OPEN_END){ mode='page'; wait=46; }
    else if(mode==='page'&&--wait<=0){
      if(focusIdx<N-1){ focusIdx++; deckTargetZ=(focusIdx-(N-1)/2)*DZ; wait=46; }
      else { mode='close'; closeP=0;
        const F=cards[focusIdx];
        F.q0=F.grp.quaternion.clone(); F.s0=F.grp.scale.x; F.y0=CH/2+F.riseCur; }
    }
  } else if(mode==='close'){
    closeP=Math.min(OPEN_END,closeP+0.028);
    const fadeOutP=Math.min(1,closeP/0.35);
    const colP=Math.min(1,Math.max(0,(closeP-0.35)/0.65));
    const rotP=Math.min(1,Math.max(0,(closeP-1)/0.35));
    const F=cards[focusIdx];
    const fy=CH/2+F.riseCur, fz=F.baseZ;
    for(const c of cards){
      const focused=c.ci===focusIdx;
      if(!focused) c.riseCur*=0.9;
      if(focused){
        const s=rotP*rotP*(3-2*rotP);
        _q.slerpQuaternions(c.q0||_IDENT,_faceQuat,s);
        c.grp.quaternion.copy(_q);
        const s0=c.s0??1;
        c.grp.scale.setScalar(s0+(1.16-s0)*s);
      } else {
        c.grp.quaternion.slerp(_IDENT,0.25);
        c.grp.scale.setScalar(c.grp.scale.x+(1-c.grp.scale.x)*0.2);
      }
      _rc.set(0,CH/2,0).applyQuaternion(c.grp.quaternion).multiplyScalar(c.grp.scale.x);
      const cy0=CH/2+c.riseCur, cz0=c.baseZ;
      let cy=cy0+(fy-cy0)*colP, cz=cz0+(fz-cz0)*colP;
      if(focused){
        const s=rotP*rotP*(3-2*rotP);
        const y0=c.y0??fy;
        cy=y0+((CH/2+6)-y0)*s;
      }
      c.grp.position.set(-_rc.x,cy-_rc.y,cz-_rc.z);
      const shellA=focused?1:Math.max(0,1-Math.max(0,(colP-0.7)/0.3));
      const ft=c.fadeT??1;
      const shellB=ft+(1-ft)*fadeOutP;
      const contentA=focused?1:ft*(1-fadeOutP);
      for(const {mat,base} of c.fades){
        const isShell=(mat===c.frameMat||mat===c.backMat);
        mat.opacity=base*(isShell?(focused?1:shellB*shellA):contentA);
      }
      if(focused){ c.frameMat.opacity=1; c.backMat.opacity=0.42; }
      c.frameMat.color.setHex(ACCENT);
    }
    if(closeP>=OPEN_END){
      mode='stack'; wait=90;
      // silent reset while stacked: keep the stack's WORLD z constant
      focusIdx=0; deckTargetZ=(0-(N-1)/2)*DZ; deck.position.z=deckTargetZ;
      for(const c of cards){ c.riseCur=0; c.fadeT=1; }
      targetViewSize=34;
    }
  }
  if(mode==='open') targetViewSize=40;
  renderer.render(scene,camera);
}
tick();

// ---------- login / unlock ----------
const gate=document.getElementById('gate'), pw=document.getElementById('pw');
const msg=document.getElementById('msg'), go=document.getElementById('go');
document.getElementById('login').onclick=()=>{
  document.body.classList.add('gated'); gate.classList.add('open'); pw.focus();
};
async function unlock(){
  msg.textContent='';
  const r=await fetch('api/unlock',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:pw.value})});
  if(r.ok){ location.href='showcase.html'; }
  else{ msg.textContent='wrong password'; pw.select(); }
}
go.onclick=unlock;
pw.addEventListener('keydown',e=>{ if(e.key==='Enter') unlock(); });
</script></body></html>
